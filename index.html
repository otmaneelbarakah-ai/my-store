<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ST.OTMANE - متجر أزياء</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* جميع الأنماط السابقة تبقى كما هي، سأضيف بعض الأنماط الجديدة للأزرار */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Tajawal', sans-serif;
    }
    body {
      background: #0a0a0c;
      color: #fff;
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 80px;
      position: relative;
    }
    .bg-glow {
      position: fixed;
      top: -100px;
      right: -100px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0,200,255,0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow2 {
      position: fixed;
      bottom: -50px;
      left: -80px;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(255,100,200,0.1) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      background: rgba(20,20,30,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 10px;
    }
    .store-title {
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 15px rgba(255,140,58,0.5);
    }
    .store-title span {
      color: #ff8c3a;
    }
    .search-bar {
      background: rgba(255,255,255,0.1);
      padding: 10px 16px;
      border-radius: 30px;
      color: #aaa;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      width: 60%;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      transition: 0.2s;
    }
    .search-bar:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(0,200,255,0.4);
    }
    .actions-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
      padding: 0 20px 20px;
    }
    .action-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      color: rgba(255,255,255,0.8);
    }
    .action-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(0,200,255,0.6);
      box-shadow: 0 0 20px rgba(0,200,255,0.5);
      color: #fff;
    }
    .action-btn.lit {
      background: rgba(76,175,80,0.2);
      border-color: #4caf50;
      box-shadow: 0 0 25px #4caf50;
      color: #fff;
    }
    .cart-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #ff8c3a;
      color: #111;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      box-shadow: 0 0 10px #ff8c3a;
    }
    .cats-scroll-wrap {
      overflow-x: auto;
      padding: 0 20px 20px;
      scrollbar-width: none;
    }
    .cats-scroll {
      display: flex;
      gap: 16px;
      width: max-content;
    }
    .cat-pill {
      width: 52px;
      height: 52px;
      border-radius: 26px;
      background: rgba(30,30,40,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 6px 15px rgba(0,0,0,0.4);
      color: rgba(255,255,255,0.8);
    }
    .cat-pill svg {
      width: 26px;
      height: 26px;
      transition: 0.3s;
    }
    .cat-pill:hover {
      background: rgba(50,50,70,0.7);
      border-color: rgba(255,255,255,0.3);
      transform: scale(1.05);
    }
    .cat-pill.active {
      background: rgba(100,200,255,0.2);
      border-color: #64b5f6;
      box-shadow: 0 0 30px #64b5f6;
      color: #fff;
    }
    .cat-pill[data-cat="Jackets"].active { border-color: #ff8c3a; box-shadow: 0 0 30px #ff8c3a; }
    .cat-pill[data-cat="Shirts"].active { border-color: #4caf50; box-shadow: 0 0 30px #4caf50; }
    .cat-pill[data-cat="Jeans"].active { border-color: #2196f3; box-shadow: 0 0 30px #2196f3; }
    .cat-pill[data-cat="Shorts"].active { border-color: #ffeb3b; box-shadow: 0 0 30px #ffeb3b; }
    .cat-pill[data-cat="Suits"].active { border-color: #9c27b0; box-shadow: 0 0 30px #9c27b0; }
    .cat-pill[data-cat="Hoodies"].active { border-color: #f44336; box-shadow: 0 0 30px #f44336; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 0 20px 20px;
    }
    .cat-card {
      background: rgba(30,30,40,0.7);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }
    .cat-card:hover {
      border-color: rgba(100,200,255,0.3);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .cat-card-img {
      width: 100%;
      aspect-ratio: 1/1;
      background: #1e1e2a;
      position: relative;
    }
    .cat-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .upload-cat-btn {
      position: absolute;
      bottom: 8px;
      left: 8px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      z-index: 10;
    }
    .cat-card-info {
      padding: 12px;
      text-align: right;
    }
    .cat-card-name {
      font-size: 16px;
      font-weight: bold;
      color: #fff;
    }
    .cat-card-count {
      font-size: 13px;
      color: #aaa;
    }
    .section-header {
      padding: 0 20px 10px;
    }
    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
    .section-title span {
      color: #ff8c3a;
    }
    .products-scroll {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding: 0 20px 20px;
      scrollbar-width: none;
    }
    .prod-card {
      min-width: 180px;
      background: rgba(30,30,40,0.7);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
      display: flex;
      flex-direction: column;
    }
    .prod-card:hover {
      border-color: rgba(255,140,58,0.4);
      box-shadow: 0 10px 25px rgba(255,140,58,0.2);
    }
    .prod-img {
      width: 100%;
      height: 160px;
      background: #222;
      position: relative;
    }
    .prod-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .prod-tag {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: #ff8c3a;
      color: #111;
      font-size: 11px;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 30px;
      backdrop-filter: blur(2px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .prod-info {
      padding: 12px;
      text-align: right;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .prod-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    .prod-desc {
      font-size: 12px;
      color: #aaa;
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .prod-price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }
    .prod-price {
      color: #ff8c3a;
      font-weight: 700;
      font-size: 16px;
    }
    .whatsapp-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #25D366;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(37,211,102,0.3);
    }
    .whatsapp-icon:hover {
      transform: scale(1.1);
      background: #20b858;
    }
    .whatsapp-icon svg {
      width: 18px;
      height: 18px;
      fill: white;
    }
    .bottom-nav {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 400px;
      background: rgba(20,20,30,0.8);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 40px;
      display: flex;
      justify-content: space-around;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.15);
      z-index: 100;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 5px;
    }
    .nav-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }
    .nav-label {
      font-size: 9px;
      color: #aaa;
    }
    .nav-item.active .nav-circle {
      background: #ff8c3a;
      color: #111;
      box-shadow: 0 0 25px #ff8c3a;
    }
    .nav-item.active .nav-label {
      color: #ff8c3a;
    }
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff8c3a;
      color: #111;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: bold;
      z-index: 200;
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
      box-shadow: 0 10px 25px rgba(255,140,58,0.3);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-10px);
    }
    #owner-dashboard {
      background: rgba(30,30,40,0.8);
      backdrop-filter: blur(20px);
      margin: 10px 20px;
      border-radius: 24px;
      padding: 20px;
      border: 1px solid #ff8c3a;
    }
    .product-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      backdrop-filter: blur(0);
      pointer-events: none;
      transition: 0.3s;
      z-index: 400;
    }
    .product-detail-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 430px;
      margin: 0 auto;
      background: rgba(30,30,40,0.95);
      backdrop-filter: blur(25px);
      border-radius: 30px 30px 0 0;
      padding: 20px;
      transform: translateY(100%);
      transition: 0.4s;
      border-top: 1px solid rgba(255,255,255,0.1);
      max-height: 85vh;
      overflow-y: auto;
    }
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .detail-header-left {
      display: flex;
      gap: 10px;
    }
    .detail-close, .detail-edit, .detail-delete {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: 0.2s;
    }
    .detail-edit:hover {
      background: #ff8c3a;
      color: #111;
    }
    .detail-delete:hover {
      background: #ff4444;
      color: #fff;
    }
    .detail-img {
      width: 100%;
      height: 250px;
      background: #1e1e2a;
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .detail-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .detail-name {
      font-size: 24px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 10px;
      text-align: right;
    }
    .detail-price {
      font-size: 28px;
      font-weight: 900;
      color: #ff8c3a;
      margin-bottom: 15px;
      text-align: right;
    }
    .detail-tag {
      display: inline-block;
      background: #ff8c3a;
      color: #111;
      font-size: 13px;
      font-weight: bold;
      padding: 6px 18px;
      border-radius: 30px;
      margin-bottom: 15px;
    }
    .detail-desc {
      font-size: 15px;
      color: #ccc;
      line-height: 1.8;
      margin-bottom: 25px;
      text-align: right;
    }
    .detail-whatsapp {
      width: 100%;
      padding: 16px;
      background: #25D366;
      border: none;
      border-radius: 30px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.2s;
    }
    .detail-whatsapp:hover {
      background: #20b858;
    }
    .detail-whatsapp svg {
      width: 20px;
      height: 20px;
      fill: white;
    }
    .login-overlay, .add-overlay, .category-overlay, .edit-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      backdrop-filter: blur(0);
      pointer-events: none;
      transition: 0.3s;
      z-index: 300;
    }
    .login-sheet, .add-sheet, .category-sheet, .edit-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 430px;
      margin: 0 auto;
      background: rgba(30,30,40,0.95);
      backdrop-filter: blur(25px);
      border-radius: 30px 30px 0 0;
      padding: 20px;
      transform: translateY(100%);
      transition: 0.4s;
      border-top: 1px solid rgba(255,255,255,0.1);
      max-height: 90vh;
      overflow-y: auto;
    }
    .login-header, .add-header, .category-header, .edit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .login-input, .add-input, .edit-input {
      width: 100%;
      padding: 15px;
      border-radius: 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      font-size: 16px;
      text-align: right;
      margin-bottom: 15px;
    }
    .login-btn, .add-btn, .edit-btn {
      width: 100%;
      padding: 15px;
      background: #ff8c3a;
      border: none;
      border-radius: 16px;
      color: #111;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .error-msg {
      color: #ff5555;
      font-size: 13px;
      text-align: right;
      margin-bottom: 10px;
    }
    .search-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
      z-index: 250;
      display: none;
      flex-direction: column;
      padding: 60px 20px;
    }
    .search-overlay.show {
      display: flex;
    }
    .search-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
    }
    .search-header input {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px;
      padding: 15px;
      color: white;
      font-size: 16px;
    }
    .search-results {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .search-item {
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(30,30,40,0.8);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 12px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .search-item-img {
      width: 60px;
      height: 60px;
      background: #222;
      border-radius: 14px;
      overflow: hidden;
    }
    .search-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .search-item-info {
      flex: 1;
      text-align: right;
    }
    .search-item-name {
      font-weight: bold;
      font-size: 16px;
    }
    .search-item-price {
      color: #ff8c3a;
      font-size: 14px;
    }
    .category-products-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 10px 0 20px;
    }
    .category-title {
      font-size: 24px;
      font-weight: 900;
      color: #ff8c3a;
      margin-bottom: 10px;
      text-align: right;
    }
    .edit-img-preview {
      width: 100%;
      height: 150px;
      background: #1a1a2a;
      border-radius: 16px;
      margin-bottom: 15px;
      overflow: hidden;
      display: none;
    }
    .edit-img-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>
  <div class="content">
    <!-- الشريط العلوي -->
    <div class="topbar">
      <div class="store-title">ST<span>.</span>OTMANE</div>
      <div class="search-bar" onclick="openSearch()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        ابحث عن منتج...
      </div>
    </div>

    <!-- أيقونات الإجراءات -->
    <div class="actions-row">
      <div class="action-btn" onclick="showToast('👤 الملف الشخصي')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <div class="action-btn" onclick="openCart()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="cart-badge" id="cart-count">0</span></div>
      <div class="action-btn" onclick="showToast('❤️ المفضلة')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
      <div class="action-btn" id="owner-btn" onclick="handleOwnerBtn()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    </div>

    <!-- لوحة المالك (تظهر بعد تسجيل الدخول) -->
    <div id="owner-dashboard" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <span style="color:#ff8c3a; font-weight:bold;">لوحة تحكم المالك</span>
        <button onclick="handleOwnerBtn()" style="background:#333; border:none; color:#aaa; padding:5px 15px; border-radius:20px; cursor:pointer;">خروج</button>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
        <div onclick="openAddProduct()" style="text-align:center; background:rgba(255,255,255,0.1); padding:15px; border-radius:15px; cursor:pointer;">

    // صور الأقسام
    let categoryImages = JSON.parse(localStorage.getItem('otmane_category_images') || '{}');

    const categories = ['Jackets', 'Shirts', 'Jeans', 'Shorts', 'Suits', 'Hoodies'];

    // دالة رسم الأقسام الرئيسية
    function renderCategoryGrid() {
      const grid = document.getElementById('cat-grid');
      if (!grid) return;
      grid.innerHTML = categories.map(cat => {
        const count = products.filter(p => p.cat === cat).length;
        const img = categoryImages[cat];
        return `
          <div class="cat-card" onclick="openCategoryPage('${cat}')">
            <div class="cat-card-img" style="background: #1a1a2a;">
              ${img ? `<img src="${img}" alt="">` : ''}
              ${isOwner ? `<button class="upload-cat-btn" onclick="event.stopPropagation(); uploadCategoryImage('${cat}')">📷</button>` : ''}
            </div>
            <div class="cat-card-info">
              <div class="cat-card-name">${cat === 'Jackets' ? 'جاكيت' : cat === 'Shirts' ? 'قمصان' : cat === 'Jeans' ? 'جينز' : cat === 'Shorts' ? 'شورت' : cat === 'Suits' ? 'بدل' : 'هودي'}</div>
              <div class="cat-card-count">${count} منتج</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // رفع صورة لقسم
    function uploadCategoryImage(cat) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          categoryImages[cat] = ev.target.result;
          saveCategoryImages();
          renderCategoryGrid();
          showToast('✅ تم تحديث صورة القسم');
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }

      const title = document.getElementById('category-title');
      
      // ترجمة اسم القسم للعربية
      const catNames = {
        Jackets: 'جاكيت',
        Shirts: 'قمصان',

        Shorts: 'شورت',

      container.innerHTML = catProducts.map(p => {

                <span class="prod-price">${p.price}</span>
                <div class="whatsapp-icon" onclick="event.stopPropagation(); orderViaWhatsApp('${p.name.replace(/'/g, "\\'")}', '${p.price}')">
                  <svg viewBox="0 0 24 24"><path d="M19.077 4.928C17.191 3.041 14.683 2 12.006 2 6.798 2 2.548 6.193 2.54 11.393c-.003 1.747.438 3.455 1.279 4.979L2.5 21.5l5.242-1.303c1.523.799 3.235 1.22 4.978 1.22h.004c5.197 0 9.456-4.194 9.464-9.394.004-2.51-.974-4.873-2.861-6.76zM12.014 19.86h-.003c-1.515 0-3.001-.408-4.285-1.176l-.307-.185-3.108.81.83-3.026-.2-.319a7.894 7.894 0 0 1-1.23-4.207c.008-4.367 3.56-7.917 7.934-7.917 2.12 0 4.112.827 5.61 2.326 1.498 1.5 2.322 3.493 2.318 5.61-.007 4.367-3.56 7.917-7.919 7.917zM16.2 13.994c-.229-.117-1.357-.67-1.567-.746-.21-.077-.363-.117-.516.117-.153.233-.594.746-.728.9-.134.152-.268.17-.497.055-.997-.477-1.846-1.055-2.577-1.772-.497-.486-.89-1.057-1.176-1.68-.123-.27-.013-.417.092-.55.096-.118.21-.266.316-.4.105-.132.14-.222.21-.37.07-.148.035-.28-.018-.395-.053-.117-.516-1.242-.707-1.7-.186-.445-.375-.385-.516-.392h-.44c-.158 0-.412.058-.628.29-.215.232-.822.803-.822 1.958 0 1.155.84 2.27.958 2.427.117.156 1.646 2.525 3.99 3.47.558.224.993.358 1.333.46.56.168 1.07.145 1.473.088.45-.064 1.386-.566 1.582-1.113.196-.547.196-1.016.137-1.114-.058-.098-.21-.156-.44-.273z"/></svg>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      // إظهار النافذة
      const overlay = document.getElementById('category-overlay');
      const sheet = document.getElementById('category-sheet');
      overlay.style.pointerEvents = 'all';
      overlay.style.background = 'rgba(0,0,0,0.75)';
      overlay.style.backdropFilter = 'blur(15px)';
      sheet.style.transform = 'translateY(0)';
    }

    function closeCategoryPage() {
      const overlay = document.getElementById('category-overlay');
      const sheet = document.getElementById('category-sheet');
      sheet.style.transform = 'translateY(100%)';
      overlay.style.background = 'rgba(0,0,0,0)';
      overlay.style.backdropFilter = 'blur(0)';
      setTimeout(() => overlay.style.pointerEvents = 'none', 400);
    }

    // متغير لتخزين المنتج الحالي المعروض في التفاصيل
    let currentDetailProduct = null;
    let currentDetailIndex = -1;

    // فتح نافذة تفاصيل المنتج
    function openProductDetail(idx) {
      currentDetailIndex = idx;
      const p = products[idx];
      currentDetailProduct = p;
      document.getElementById('detail-name').textContent = p.name;
      document.getElementById('detail-price').textContent = p.price;
      document.getElementById('detail-tag').textContent = p.tag;
      document.getElementById('detail-desc').textContent = p.desc;
      const imgDiv = document.getElementById('detail-img');
      if (p.image) {
        imgDiv.innerHTML = `<img src="${p.image}" alt="">`;
      } else {
        imgDiv.innerHTML = ''; // خلفية فقط
      }

      // إظهار أزرار التعديل والحذف فقط للمالك
      const editBtn = document.getElementById('detail-edit');
      const deleteBtn = document.getElementById('detail-delete');
      if (isOwner) {
        editBtn.style.display = 'flex';
        deleteBtn.style.display = 'flex';
      } else {
        editBtn.style.display = 'none';
        deleteBtn.style.display = 'none';
      }

      const overlay = document.getElementById('product-detail-overlay');
      const sheet = document.getElementById('product-detail-sheet');
      overlay.style.pointerEvents = 'all';
      overlay.style.background = 'rgba(0,0,0,0.75)';
      overlay.style.backdropFilter = 'blur(15px)';
      sheet.style.transform = 'translateY(0)';
    }

    function closeProductDetail() {
      const overlay = document.getElementById('product-detail-overlay');
      const sheet = document.getElementById('product-detail-sheet');
      sheet.style.transform = 'translateY(100%)';
      overlay.style.background = 'rgba(0,0,0,0)';
      overlay.style.backdropFilter = 'blur(0)';
      setTimeout(() => overlay.style.pointerEvents = 'none', 400);
    }

    function orderFromDetail() {
      if (currentDetailProduct) {
        orderViaWhatsApp(currentDetailProduct.name, currentDetailProduct.price);
      }
    }

    // طلب واتساب
    function orderViaWhatsApp(name, price) {
      const msg = `مرحباً، أود طلب ${name} بسعر ${price}`;
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    // إضافة إلى السلة
    function addToCart(e) {
      e.stopPropagation();
      cartCount++;
      document.getElementById('cart-count').textContent = cartCount;
      showToast('✓ تمت الإضافة للسلة');
    }

    // دوال المالك
    function handleOwnerBtn() {
      if (isOwner) {
        isOwner = false;
        document.getElementById('owner-dashboard').style.display = 'none';
        document.getElementById('owner-btn').classList.remove('lit');
        renderCategoryGrid();
        // إخفاء أزرار التعديل والحذف في التفاصيل إذا كانت مفتوحة
        if (document.getElementById('product-detail-overlay').style.pointerEvents === 'all') {
          document.getElementById('detail-edit').style.display = 'none';
          document.getElementById('detail-delete').style.display = 'none';
        }
        showToast('🔒 تم تسجيل الخروج');
      } else {
        openLogin();
      }
    }

    function openLogin() {
      const overlay = document.getElementById('login-overlay');
      const sheet = document.getElementById('login-sheet');
      overlay.style.pointerEvents = 'all';
      overlay.style.background = 'rgba(0,0,0,0.75)';
      overlay.style.backdropFilter = 'blur(15px)';
      sheet.style.transform = 'translateY(0)';
    }

    function closeLogin() {
      const overlay = document.getElementById('login-overlay');
      const sheet = document.getElementById('login-sheet');
      sheet.style.transform = 'translateY(100%)';
      overlay.style.background = 'rgba(0,0,0,0)';
      overlay.style.backdropFilter = 'blur(0)';
      setTimeout(() => overlay.style.pointerEvents = 'none', 400);
    }

    function tryLogin() {
      const pass = document.getElementById('owner-pass').value;
      if (pass === OWNER_PASSWORD) {
        isOwner = true;
        closeLogin();
        document.getElementById('owner-dashboard').style.display = 'block';
        document.getElementById('owner-btn').classList.add('lit');
        renderCategoryGrid();
        // إذا كانت التفاصيل مفتوحة، نظهر الأزرار
        if (document.getElementById('product-detail-overlay').style.pointerEvents === 'all') {
          document.getElementById('detail-edit').style.display = 'flex';
          document.getElementById('detail-delete').style.display = 'flex';
        }
        showToast('🔓 مرحباً بك يا مالك');
      } else {
        document.getElementById('login-error').textContent = '❌ كلمة المرور غير صحيحة';
      }
    }

    // دوال إضافة منتج جديد
    let newProductImageData = null;

    function openAddProduct() {
      if (!isOwner) { showToast('يجب تسجيل الدخول أولاً'); return; }
      const overlay = document.getElementById('add-overlay');
      const sheet = document.getElementById('add-sheet');
      overlay.style.pointerEvents = 'all';
      overlay.style.background = 'rgba(0,0,0,0.7)';
      overlay.style.backdropFilter = 'blur(15px)';
      sheet.style.transform = 'translateY(0)';
    }

    function closeAddProduct() {
      const overlay = document.getElementById('add-overlay');
      const sheet = document.getElementById('add-sheet');
      sheet.style.transform = 'translateY(100%)';
      overlay.style.background = 'rgba(0,0,0,0)';
      overlay.style.backdropFilter = 'blur(0)';
      setTimeout(() => overlay.style.pointerEvents = 'none', 400);
      // reset
      document.getElementById('new-name').value = '';
      document.getElementById('new-price').value = '';
      document.getElementById('new-desc').value = '';
      document.getElementById('new-tag').value = '';
      newProductImageData = null;
      document.getElementById('new-img-preview').style.display = 'none';
    }

    function previewNewImage(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        newProductImageData = e.target.result;
        const preview = document.getElementById('new-img-preview');
        const previewImg = document.getElementById('new-img-preview-img');
        previewImg.src = newProductImageData;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function saveNewProduct() {
      const name = document.getElementById('new-name').value.trim();
      const price = document.getElementById('new-price').value.trim();
      const desc = document.getElementById('new-desc').value.trim();
      const cat = document.getElementById('new-cat').value;
      const tag = document.getElementById('new-tag').value.trim() || 'جديد';
      if (!name || !price || !desc) { showToast('⚠️ أكمل البيانات'); return; }
      const newProd = {
        name,
        price: `DA ${Number(price).toLocaleString()}`,
        cat,
        tag,
        desc,
        image: newProductImageData || null
      };
      products.push(newProd);
      localStorage.setItem('otmane_products', JSON.stringify(products));
      closeAddProduct();
      refreshHomeProducts();
      renderCategoryGrid();
      showToast('✅ تمت الإضافة');
    }

    // دوال تعديل المنتج
    let editImageData = null;

    function openEditProduct() {
      if (!isOwner || currentDetailIndex === -1) return;
      const p = products[currentDetailIndex];
      
      // تعبئة الحقول
      document.getElementById('edit-name').value = p.name;
      document.getElementById('edit-price').value = p.price.replace(/[^0-9]/g, '');
      document.getElementById('edit-desc').value = p.desc;
      document.getElementById('edit-cat').value = p.cat;
      document.getElementById('edit-tag').value = p.tag;
      
      // معاينة الصورة الحالية
      if (p.image) {
        document.getElementById('edit-img-preview-img').src = p.image;
        document.getElementById('edit-img-preview').style.display = 'block';
        editImageData = p.image;
      } else {
        document.getElementById('edit-img-preview').style.display = 'none';
        editImageData = null;
      }

      // إغلاق نافذة التفاصيل وفتح نافذة التعديل
      closeProductDetail();
      const overlay = document.getElementById('edit-overlay');
      const sheet = document.getElementById('edit-sheet');
      overlay.style.pointerEvents = 'all';
      overlay.style.background = 'rgba(0,0,0,0.7)';
      overlay.style.backdropFilter = 'blur(15px)';
      sheet.style.transform = 'translateY(0)';
    }

    function closeEditProduct() {
      const overlay = document.getElementById('edit-overlay');
      const sheet = document.getElementById('edit-sheet');
      sheet.style.transform = 'translateY(100%)';
      overlay.style.background = 'rgba(0,0,0,0)';
      overlay.style.backdropFilter = 'blur(0)';
      setTimeout(() => overlay.style.pointerEvents = 'none', 400);
    }

    function previewEditImage(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        editImageData = e.target.result;
        document.getElementById('edit-img-preview-img').src = editImageData;
        document.getElementById('edit-img-preview').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function saveEditedProduct() {
      if (currentDetailIndex === -1) return;
      const name = document.getElementById('edit-name').value.trim();
      const price = document.getElementById('edit-price').value.trim();
      const desc = document.getElementById('edit-desc').value.trim();
      const cat = document.getElementById('edit-cat').value;
      const tag = document.getElementById('edit-tag').value.trim() || 'جديد';
      
      if (!name || !price || !desc) { showToast('⚠️ أكمل البيانات'); return; }

      // تحديث المنتج
      products[currentDetailIndex] = {
        ...products[currentDetailIndex],
        name,
        price: `DA ${Number(price).toLocaleString()}`,
        desc,
        cat,
        tag,
        image: editImageData || products[currentDetailIndex].image
      };

      localStorage.setItem('otmane_products', JSON.stringify(products));
      closeEditProduct();
      refreshHomeProducts();
      renderCategoryGrid();
      showToast('✅ تم تعديل المنتج');
    }

    // دوال حذف المنتج
    function deleteProduct() {
      if (!isOwner || currentDetailIndex === -1) return;
      if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
        products.splice(currentDetailIndex, 1);
        localStorage.setItem('otmane_products', JSON.stringify(products));
        closeProductDetail();
        refreshHomeProducts();
        renderCategoryGrid();
        showToast('🗑️ تم حذف المنتج');
      }
    }

    // دوال البحث
    function openSearch() {
      document.getElementById('search-overlay').classList.add('show');
      document.getElementById('search-input').focus();
    }

    function closeSearch() {
      document.getElementById('search-overlay').classList.remove('show');
      document.getElementById('search-results').innerHTML = '';
    }

    function performSearch() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      const resultsContainer = document.getElementById('search-results');
      if (query.length < 2) {
        resultsContainer.innerHTML = '';
        return;
      }
      const results = products.filter(p => p.name.includes(query));
      if (results.length === 0) {
        resultsContainer.innerHTML = '<div style="color:#aaa; text-align:center;">لا توجد نتائج</div>';
        return;
      }
      resultsContainer.innerHTML = results.map(p => `
        <div class="search-item" onclick="selectSearchResult('${products.indexOf(p)}')">
          <div class="search-item-img">
            ${p.image ? `<img src="${p.image}" alt="">` : ''}
          </div>
          <div class="search-item-info">
            <div class="search-item-name">${p.name}</div>
            <div class="search-item-price">${p.price}</div>
          </div>
        </div>
      `).join('');
    }

    function selectSearchResult(idx) {
      closeSearch();
      openProductDetail(idx);
    }

    // دوال القائمة السفلية
    function setActiveNav(el, page) {
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      switch(page) {
        case 'home': showToast('🏠 الرئيسية'); break;
        case 'search': openSearch(); break;
        case 'cart': openCart(); break;
        case 'favorites': showToast('❤️ المفضلة'); break;
        case 'account': showToast('👤 حسابي'); break;
      }
    }

    function openCart() {
      if (cartCount === 0) showToast('السلة فارغة');
      else showToast(`السلة تحتوي على ${cartCount} منتجات`);
    }

    // Toast
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // تهيئة الصفحة
    window.addEventListener('DOMContentLoaded', () => {
      renderCategoryGrid();
      refreshHomeProducts();
      // تحميل المنتجات المحفوظة
      try {
        const saved = localStorage.getItem('otmane_products');
        if (saved) products = JSON.parse(saved);
      } catch(e) {}
    });
  </script>
</body>
</html>
